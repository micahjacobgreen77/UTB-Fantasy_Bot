name: Fantasy Bot

on:
  schedule:
    # Runs every 20 minutes from noon to midnight ET (16:00-04:00 UTC)
    - cron: "0,15,30,45 16-23 * * *"
    - cron: "0,15,30,45 0-4 * * *"
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install MLB-StatsAPI requests python-dotenv requests-oauthlib

      - name: Run bot
        env:
          POST_TO_X: "true"
          API_KEY: ${{ secrets.API_KEY }}
          API_SECRET: ${{ secrets.API_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
        run: python fantasy_bot.py

      - name: Save bot state back to repo
        run: |
          git config user.name "fantasy-bot"
          git config user.email "bot@users.noreply.github.com"
          git add bot_state.json
          git diff --cached --quiet || git commit -m "chore: update bot_state [skip ci]"
          git push
